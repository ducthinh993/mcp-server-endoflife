name: "CodeQL Config"

queries:
  - uses: security-and-quality
  - uses: security-extended

paths:
  - src
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'

query-filters:
  - exclude:
      problem.severity:
        - warning
        - recommendation